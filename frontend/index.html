<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Dice Goblins</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        background: #1A0E0A;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      header {
        margin: 8px auto;
        width: 100%;
        max-width: 360px;
        height: 128px;
        background: url('/assets/hero_logo.png') no-repeat center center;
        background-size: contain;
      }
      header h1, header h2 {
        display: none;
      }
      #app {
        height: calc(90vh - 144px);
        min-height: 360px;
        padding: 0 12px 12px;
        margin-bottom: 2vh;
        box-sizing: border-box;
      }
      canvas {
        display: block;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Stencil+Text:wght@400..900&family=IBM+Plex+Sans+Condensed:ital,wght@0,100..700;1,100..700&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Saira+Stencil+One&display=swap" rel="stylesheet">
  </head>
  <body>
    <header>
      <h1>Dice Goblins</h1>
      <h2>Tactics. Loot. Questionable Management</h2>
    </header>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
